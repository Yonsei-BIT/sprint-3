<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>따릉이 네비게이터</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; height: 100vh; background: #f0f4f8; }

    header {
      background: #00adef; color: white;
      padding: 12px 16px; display: flex; align-items: center; gap: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15); flex-shrink: 0;
    }
    header h1 { font-size: 1.1rem; font-weight: 700; }

    /* 네비 중 상단 안내 패널 */
    #nav-bar {
      display: none;
      background: #1565c0; color: white;
      padding: 14px 16px; flex-shrink: 0;
    }
    #nav-bar.bike { background: #00adef; }
    #nav-bar.walk2 { background: #b71c1c; }
    #nav-instruction { font-size: 1.1rem; font-weight: 700; margin-bottom: 4px; }
    #nav-distance { font-size: 0.85rem; opacity: 0.9; }

    /* 입력 패널 */
    #input-panel {
      background: white; padding: 14px 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1); flex-shrink: 0;
      display: flex; flex-direction: column; gap: 8px;
    }
    .input-row { display: flex; gap: 8px; align-items: center; }
    .input-row label { font-size: 0.82rem; font-weight: 600; color: #555; width: 55px; flex-shrink: 0; }
    .input-row input {
      flex: 1; padding: 8px 12px; border: 1.5px solid #ddd;
      border-radius: 8px; font-size: 0.9rem; outline: none;
    }
    .input-row input:focus { border-color: #00adef; }
    .loc-btn {
      padding: 8px 10px; background: #e3f2fd; border: 1.5px solid #90caf9;
      border-radius: 8px; font-size: 0.8rem; cursor: pointer; white-space: nowrap; flex-shrink: 0;
    }
    .btn-row { display: flex; gap: 8px; }
    button.primary { flex: 2; padding: 10px; background: #00adef; color: white; border: none; border-radius: 8px; font-size: 0.95rem; font-weight: 700; cursor: pointer; }
    button.primary:hover { background: #0099d6; }
    button.secondary { flex: 1; padding: 10px; background: #eee; color: #555; border: none; border-radius: 8px; font-size: 0.9rem; font-weight: 600; cursor: pointer; }
    button.secondary:hover { background: #ddd; }
    #status { font-size: 0.83rem; min-height: 18px; }
    #status.error { color: #c00; }
    #status.loading { color: #00adef; }
    #status.ok { color: #2e7d32; }

    #map { flex: 1; }

    /* 하단 정보 패널 */
    #info-panel {
      background: white; border-top: 1px solid #eee;
      max-height: 220px; overflow-y: auto; display: none; flex-shrink: 0;
    }
    #info-panel.visible { display: block; }

    .phase-tabs { display: flex; border-bottom: 1px solid #eee; }
    .phase-tab {
      flex: 1; padding: 9px 4px; text-align: center;
      font-size: 0.78rem; font-weight: 600; color: #888;
      cursor: pointer; border-bottom: 2px solid transparent;
    }
    .phase-tab.active { color: #00adef; border-bottom-color: #00adef; }

    .phase-content { padding: 12px 16px; }
    .station-card {
      background: #f7fafd; border: 1px solid #d0e8f5;
      border-radius: 8px; padding: 10px 12px; margin-bottom: 8px;
    }
    .station-card .name { font-weight: 600; font-size: 0.88rem; margin-bottom: 3px; }
    .station-card .detail { color: #666; font-size: 0.8rem; }
    .badge {
      display: inline-block; padding: 2px 7px; border-radius: 12px;
      font-size: 0.75rem; font-weight: 700; margin-left: 5px;
    }
    .badge-ok   { background: #d4f8e8; color: #1a8a4a; }
    .badge-warn { background: #fff3cd; color: #856404; }
    .badge-none { background: #fde8e8; color: #b30000; }

    #nav-start-btn {
      display: none; width: calc(100% - 32px); margin: 10px 16px;
      padding: 12px; background: #2e7d32; color: white;
      border: none; border-radius: 10px; font-size: 1rem;
      font-weight: 700; cursor: pointer;
    }
    #nav-start-btn:hover { background: #1b5e20; }
    #nav-stop-btn {
      display: none; width: calc(100% - 32px); margin: 10px 16px;
      padding: 10px; background: #c62828; color: white;
      border: none; border-radius: 10px; font-size: 0.9rem;
      font-weight: 700; cursor: pointer;
    }
  </style>
</head>
<body>

<header>
  <span>🚲</span>
  <h1>따릉이 네비게이터</h1>
</header>

<div id="nav-bar">
  <div id="nav-instruction">경로를 계산 중입니다...</div>
  <div id="nav-distance"></div>
</div>

<div id="input-panel">
  <div class="input-row">
    <label>출발지</label>
    <input id="origin" type="text" placeholder="예: 홍대입구역" />
    <button class="loc-btn" onclick="useMyLocation()">📍 현재위치</button>
  </div>
  <div class="input-row">
    <label>목적지</label>
    <input id="destination" type="text" placeholder="예: 여의도 한강공원" />
  </div>
  <div id="status"></div>
  <div class="btn-row">
    <button class="primary" onclick="searchRoute()">🔍 경로 탐색</button>
    <button class="secondary" onclick="resetAll()">초기화</button>
  </div>
</div>

<div id="map"></div>

<button id="nav-start-btn" onclick="startNavigation()">🧭 네비게이션 시작</button>
<button id="nav-stop-btn" onclick="stopNavigation()">■ 네비게이션 종료</button>

<div id="info-panel">
  <div class="phase-tabs">
    <div class="phase-tab active" onclick="showTab(0)">① 🚶 출발→대여</div>
    <div class="phase-tab" onclick="showTab(1)">② 🚲 대여→반납</div>
    <div class="phase-tab" onclick="showTab(2)">③ 🚶 반납→도착</div>
  </div>
  <div id="tab-content" class="phase-content"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const SEOUL_KEY = '445966474d796a64363655516c4f79';
const BIKE_URL  = 'http://openapi.seoul.go.kr:8088/' + SEOUL_KEY + '/json/bikeList/1/1000/';
const OSRM_FOOT = 'https://router.project-osrm.org/route/v1/foot/';
const OSRM_BIKE = 'https://router.project-osrm.org/route/v1/bike/';

var map = L.map('map').setView([37.5665, 126.9780], 13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap contributors', maxZoom: 19
}).addTo(map);

var layers = [], myMarker = null, watchId = null;
var routeData = null; // {origin, dest, rent, ret, phases:[{steps,coords}]}
var navPhase = 0, navStepIdx = 0, navActive = false;
var tabData = [{}, {}, {}];
var currentTab = 0;

// ── 유틸 ──────────────────────────────────────────────
function setStatus(msg, type) {
  var el = document.getElementById('status');
  el.textContent = msg; el.className = type || '';
}

function haversine(lat1, lng1, lat2, lng2) {
  var R = 6371000, dLat = (lat2-lat1)*Math.PI/180, dLng = (lng2-lng1)*Math.PI/180;
  var a = Math.sin(dLat/2)*Math.sin(dLat/2) +
          Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)*Math.sin(dLng/2);
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function nearestStation(lat, lng, stations, minBikes) {
  return stations
    .filter(function(s){ return parseInt(s.parkingBikeTotCnt) >= minBikes; })
    .map(function(s){ return Object.assign({}, s, { dist: haversine(lat, lng, parseFloat(s.stationLatitude), parseFloat(s.stationLongitude)) }); })
    .sort(function(a,b){ return a.dist - b.dist; })[0];
}

function bikeBadge(n) {
  n = parseInt(n);
  if (n >= 3) return '<span class="badge badge-ok">자전거 ' + n + '대</span>';
  if (n >= 1) return '<span class="badge badge-warn">자전거 ' + n + '대</span>';
  return '<span class="badge badge-none">자전거 없음</span>';
}

function fmtDist(m) {
  return m >= 1000 ? (m/1000).toFixed(1) + 'km' : Math.round(m) + 'm';
}

function fmtTime(sec) {
  var m = Math.round(sec / 60);
  return m < 1 ? '1분 미만' : m + '분';
}

function clearMap() {
  layers.forEach(function(l){ map.removeLayer(l); });
  layers = [];
}

// ── 위치 ──────────────────────────────────────────────
function useMyLocation() {
  setStatus('📍 현재 위치 가져오는 중...', 'loading');
  navigator.geolocation.getCurrentPosition(function(pos) {
    var lat = pos.coords.latitude, lng = pos.coords.longitude;
    reverseGeocode(lat, lng).then(function(name) {
      document.getElementById('origin').value = name;
      document.getElementById('origin').dataset.lat = lat;
      document.getElementById('origin').dataset.lng = lng;
      setStatus('📍 현재 위치 설정됨', 'ok');
    });
  }, function() {
    setStatus('위치 권한을 허용해 주세요.', 'error');
  });
}

function reverseGeocode(lat, lng) {
  return fetch('https://nominatim.openstreetmap.org/reverse?format=json&lat=' + lat + '&lon=' + lng + '&accept-language=ko')
    .then(function(r){ return r.json(); })
    .then(function(d){ return d.display_name.split(',')[0]; })
    .catch(function(){ return '현재 위치'; });
}

function geocode(address, inputEl) {
  // 현재위치 버튼으로 설정된 경우 좌표 직접 사용
  if (inputEl && inputEl.dataset.lat) {
    return Promise.resolve({ lat: parseFloat(inputEl.dataset.lat), lng: parseFloat(inputEl.dataset.lng) });
  }
  return fetch('https://nominatim.openstreetmap.org/search?format=json&q=' + encodeURIComponent(address + ' 서울') + '&limit=1')
    .then(function(r){ return r.json(); })
    .then(function(d){
      if (!d || !d.length) throw new Error('"' + address + '" 위치를 찾을 수 없습니다.');
      return { lat: parseFloat(d[0].lat), lng: parseFloat(d[0].lon) };
    });
}

// ── OSRM 경로 ──────────────────────────────────────────
function getRoute(mode, from, to) {
  var base = mode === 'bike' ? OSRM_BIKE : OSRM_FOOT;
  var url = base + from.lng + ',' + from.lat + ';' + to.lng + ',' + to.lat +
            '?steps=true&geometries=geojson&overview=full';
  return fetch(url)
    .then(function(r){ return r.json(); })
    .then(function(d){
      var route = d.routes[0];
      var coords = route.geometry.coordinates.map(function(c){ return [c[1], c[0]]; });
      var steps = route.legs[0].steps.map(function(s){
        return {
          instruction: translateManeuver(s.maneuver.type, s.maneuver.modifier, s.name),
          distance: s.distance,
          location: [s.maneuver.location[1], s.maneuver.location[0]]
        };
      });
      // 자전거 구간은 시속 12km 기준으로 소요시간 재계산 (OSRM 기본값이 너무 빠름)
      var duration = mode === 'bike' ? route.distance / (12000 / 3600) : route.duration;
      return { coords: coords, steps: steps, distance: route.distance, duration: duration };
    });
}

function translateManeuver(type, modifier, name) {
  var road = name ? ' ' + name + '으로' : '';
  if (type === 'depart') return '출발합니다' + road;
  if (type === 'arrive') return '목적지에 도착했습니다';
  if (type === 'turn') {
    if (modifier === 'left') return '좌회전' + road;
    if (modifier === 'right') return '우회전' + road;
    if (modifier === 'slight left') return '왼쪽 방향' + road;
    if (modifier === 'slight right') return '오른쪽 방향' + road;
    if (modifier === 'straight') return '직진' + road;
    if (modifier === 'uturn') return 'U턴' + road;
  }
  if (type === 'new name') return '직진' + road;
  if (type === 'continue') return '직진' + road;
  if (type === 'roundabout') return '로터리 진입' + road;
  if (type === 'exit roundabout') return '로터리 진출' + road;
  return '계속 이동' + road;
}

// ── 따릉이 데이터 ──────────────────────────────────────
function fetchBikeStations() {
  return fetch('/api/bikes')
    .then(function(r){ return r.json(); })
    .then(function(d){ return d.rentBikeStatus.row; });
}

// ── 마커 / 경로선 ──────────────────────────────────────
function addLabel(lat, lng, text, color) {
  var m = L.marker([lat, lng], {
    icon: L.divIcon({
      className: '',
      html: '<div style="background:' + color + ';color:white;padding:4px 9px;border-radius:16px;font-size:11px;font-weight:700;white-space:nowrap;box-shadow:0 2px 5px rgba(0,0,0,0.3)">' + text + '</div>',
      iconAnchor: [20, 8]
    })
  }).addTo(map);
  layers.push(m);
}

function drawRoute(coords, color, dash) {
  var line = L.polyline(coords, { color: color, weight: 5, opacity: 0.85, dashArray: dash ? '8,5' : null }).addTo(map);
  layers.push(line);
}

// ── 탭 ────────────────────────────────────────────────
function showTab(idx) {
  currentTab = idx;
  document.querySelectorAll('.phase-tab').forEach(function(t, i){ t.classList.toggle('active', i === idx); });
  var d = tabData[idx];
  if (!d.stationName) return;
  var html = '<div class="station-card">' +
    '<div class="name">' + d.icon + ' ' + d.stationName + ' ' + bikeBadge(d.bikes) + '</div>' +
    '<div class="detail">' + d.fromLabel + '에서 약 ' + fmtDist(d.walkDist) + ' 도보 · ' + fmtTime(d.walkTime) + '</div>' +
    '</div>';
  if (d.bikeLabel) {
    html += '<div class="station-card"><div class="name">🚲 자전거 구간</div>' +
      '<div class="detail">거리 ' + fmtDist(d.bikeDist) + ' · 예상 ' + fmtTime(d.bikeTime) + '</div></div>';
  }
  document.getElementById('tab-content').innerHTML = html;
}

// ── 경로 탐색 ──────────────────────────────────────────
function searchRoute() {
  var originText = document.getElementById('origin').value.trim();
  var destText   = document.getElementById('destination').value.trim();
  var originEl   = document.getElementById('origin');
  var destEl     = document.getElementById('destination');

  if (!originText || !destText) { setStatus('출발지와 목적지를 입력해 주세요.', 'error'); return; }

  setStatus('🔄 경로 탐색 중...', 'loading');
  clearMap();
  document.getElementById('info-panel').classList.remove('visible');
  document.getElementById('nav-start-btn').style.display = 'none';

  Promise.all([geocode(originText, originEl), geocode(destText, destEl), fetchBikeStations()])
    .then(function(res) {
      var origin   = res[0], dest = res[1], stations = res[2];
      var rent = nearestStation(origin.lat, origin.lng, stations, 1);
      var ret  = nearestStation(dest.lat,   dest.lng,   stations, 0);

      if (!rent) throw new Error('출발지 근처에 자전거가 있는 대여소가 없습니다.');
      if (!ret)  throw new Error('목적지 근처에 반납 가능한 대여소가 없습니다.');

      var rentCoord   = { lat: parseFloat(rent.stationLatitude),  lng: parseFloat(rent.stationLongitude) };
      var returnCoord = { lat: parseFloat(ret.stationLatitude),   lng: parseFloat(ret.stationLongitude) };

      setStatus('🔄 경로 계산 중...', 'loading');

      return Promise.all([
        getRoute('foot', origin,    rentCoord),
        getRoute('bike', rentCoord, returnCoord),
        getRoute('foot', returnCoord, dest)
      ]).then(function(routes) {
        routeData = {
          origin: origin, dest: dest,
          rent: rent, ret: ret,
          rentCoord: rentCoord, returnCoord: returnCoord,
          phases: routes
        };

        // 지도에 표시
        drawRoute(routes[0].coords, '#1565c0', true);
        drawRoute(routes[1].coords, '#00adef', false);
        drawRoute(routes[2].coords, '#b71c1c', true);

        addLabel(origin.lat,        origin.lng,        '🔵출발', '#1565c0');
        addLabel(rentCoord.lat,     rentCoord.lng,     '🟢대여', '#2e7d32');
        addLabel(returnCoord.lat,   returnCoord.lng,   '🟠반납', '#e65100');
        addLabel(dest.lat,          dest.lng,          '🔴도착', '#b71c1c');

        var bounds = L.latLngBounds([
          [origin.lat, origin.lng], [rentCoord.lat, rentCoord.lng],
          [returnCoord.lat, returnCoord.lng], [dest.lat, dest.lng]
        ]);
        map.fitBounds(bounds, { padding: [40, 40] });

        // 탭 데이터
        tabData[0] = { icon: '🟢', stationName: rent.stationName, bikes: rent.parkingBikeTotCnt,
          fromLabel: originText, walkDist: routes[0].distance, walkTime: routes[0].duration };
        tabData[1] = { icon: '🟠', stationName: ret.stationName, bikes: ret.parkingBikeTotCnt,
          fromLabel: rent.stationName, walkDist: routes[1].distance, walkTime: routes[1].duration,
          bikeLabel: true, bikeDist: routes[1].distance, bikeTime: routes[1].duration };
        tabData[2] = { icon: '🔴', stationName: '목적지', bikes: 0,
          fromLabel: ret.stationName, walkDist: routes[2].distance, walkTime: routes[2].duration };

        showTab(0);
        document.getElementById('info-panel').classList.add('visible');
        document.getElementById('nav-start-btn').style.display = 'block';
        setStatus('✅ 경로 탐색 완료', 'ok');
      });
    })
    .catch(function(e) { setStatus(e.message || '오류가 발생했습니다.', 'error'); });
}

// ── 네비게이션 ─────────────────────────────────────────
var myCircle = null;

function startNavigation() {
  if (!routeData) return;
  navActive = true; navPhase = 0; navStepIdx = 0;

  document.getElementById('nav-start-btn').style.display = 'none';
  document.getElementById('nav-stop-btn').style.display = 'block';
  document.getElementById('nav-bar').style.display = 'block';
  document.getElementById('input-panel').style.display = 'none';
  document.getElementById('info-panel').classList.remove('visible');

  updateNavUI();

  watchId = navigator.geolocation.watchPosition(onLocationUpdate, function() {
    setStatus('GPS 신호를 찾을 수 없습니다.', 'error');
  }, { enableHighAccuracy: true, maximumAge: 2000 });
}

function stopNavigation() {
  navActive = false;
  if (watchId) navigator.geolocation.clearWatch(watchId);
  document.getElementById('nav-bar').style.display = 'none';
  document.getElementById('nav-stop-btn').style.display = 'none';
  document.getElementById('nav-start-btn').style.display = 'block';
  document.getElementById('input-panel').style.display = 'flex';
  document.getElementById('info-panel').classList.add('visible');
}

function onLocationUpdate(pos) {
  var lat = pos.coords.latitude, lng = pos.coords.longitude;

  // 현재 위치 원 표시
  if (!myCircle) {
    myCircle = L.circleMarker([lat, lng], { radius: 10, color: '#fff', fillColor: '#1565c0', fillOpacity: 0.9, weight: 3 }).addTo(map);
    layers.push(myCircle);
  } else {
    myCircle.setLatLng([lat, lng]);
  }
  map.panTo([lat, lng]);

  if (!navActive) return;

  var phase = routeData.phases[navPhase];
  var steps = phase.steps;

  // 현재 스텝 완료 여부 체크
  while (navStepIdx < steps.length - 1) {
    var stepLoc = steps[navStepIdx + 1].location;
    var dist = haversine(lat, lng, stepLoc[0], stepLoc[1]);
    if (dist < 25) { // 25m 이내면 다음 스텝
      navStepIdx++;
      speak(steps[navStepIdx].instruction);
    } else break;
  }

  // 구간 완료 체크 (마지막 스텝 목적지 25m 이내)
  var lastStep = steps[steps.length - 1];
  var distToEnd = haversine(lat, lng, lastStep.location[0], lastStep.location[1]);
  if (distToEnd < 30 && navPhase < 2) {
    navPhase++; navStepIdx = 0;
    var phaseNames = ['대여소에 도착했습니다. 자전거를 빌리세요.', '반납소에 도착했습니다. 자전거를 반납하세요.', '목적지에 도착했습니다!'];
    speak(phaseNames[navPhase - 1]);
    updateNavUI();
    return;
  }
  if (distToEnd < 30 && navPhase === 2) {
    speak('목적지에 도착했습니다!');
    stopNavigation();
    return;
  }

  updateNavUI(lat, lng);
}

function updateNavUI(lat, lng) {
  if (!routeData) return;
  var phaseNames = ['도보', '자전거', '도보'];
  var bar = document.getElementById('nav-bar');
  bar.className = navPhase === 1 ? 'bike' : (navPhase === 2 ? 'walk2' : '');

  var phase = routeData.phases[navPhase];
  var step  = phase.steps[navStepIdx] || phase.steps[phase.steps.length - 1];
  document.getElementById('nav-instruction').textContent = step.instruction;

  var distStr = '';
  if (lat && lng && navStepIdx + 1 < phase.steps.length) {
    var next = phase.steps[navStepIdx + 1];
    distStr = fmtDist(haversine(lat, lng, next.location[0], next.location[1])) + ' 후 ';
  }
  var phaseLabels = ['① 도보 — 대여소로', '② 자전거 — 반납소로', '③ 도보 — 목적지로'];
  document.getElementById('nav-distance').textContent = phaseLabels[navPhase] + (distStr ? ' · 다음: ' + distStr : '');
}

// ── 음성 안내 ──────────────────────────────────────────
var lastSpoken = '';
function speak(text) {
  if (text === lastSpoken) return;
  lastSpoken = text;
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  var utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'ko-KR'; utt.rate = 1.0;
  window.speechSynthesis.speak(utt);
}

// ── 초기화 ─────────────────────────────────────────────
function resetAll() {
  stopNavigation();
  clearMap();
  if (myCircle) { map.removeLayer(myCircle); myCircle = null; }
  document.getElementById('origin').value = '';
  document.getElementById('destination').value = '';
  delete document.getElementById('origin').dataset.lat;
  delete document.getElementById('origin').dataset.lng;
  document.getElementById('info-panel').classList.remove('visible');
  document.getElementById('nav-start-btn').style.display = 'none';
  document.getElementById('input-panel').style.display = 'flex';
  setStatus('', '');
  routeData = null;
}
</script>
</body>
