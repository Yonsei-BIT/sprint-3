[build]
  publish = "public"
  functions = "netlify/functions"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"

[functions]
  node_bundler = "esbuild"
  included_files = ["netlify/functions/**"]

[functions."analyze"]
  timeout = 26

[functions."chat"]
  timeout = 26
